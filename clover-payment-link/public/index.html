<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zukerino — Payment Link</title>
  <style>
    :root {
      --bg: #fdf6ef;
      --card: #ffffff;
      --ink: #3a2a20;
      --muted: #8a7563;
      --brand: #c0682f;
      --brand-dark: #a4551f;
      --line: #ecddcf;
      --ok: #1f7a4d;
      --err: #b3261e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 60px;
    }
    .wrap { width: 100%; max-width: 460px; }
    .brand { text-align: center; margin-bottom: 18px; }
    .brand h1 { margin: 0; font-size: 26px; letter-spacing: .5px; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(120, 80, 40, .08);
    }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    label:first-of-type { margin-top: 0; }
    .hint { font-weight: 400; color: var(--muted); }
    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
    }
    input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(192,104,47,.15); }
    .amount-row { position: relative; }
    .amount-row span { position: absolute; left: 14px; top: 12px; font-size: 16px; color: var(--muted); }
    .amount-row input { padding-left: 28px; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--brand);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: var(--brand-dark); }
    button:disabled { opacity: .6; cursor: default; }
    .result { margin-top: 22px; display: none; }
    .result.show { display: block; }
    .linkbox {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .linkbox input { font-size: 14px; background: #faf3ec; }
    .copy-btn {
      width: auto; margin: 0; padding: 0 16px; white-space: nowrap;
      background: var(--ink);
    }
    .copy-btn:hover { background: #2a1d15; }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions a {
      flex: 1; text-align: center; text-decoration: none;
      padding: 11px; border-radius: 10px; font-weight: 600; font-size: 14px;
      border: 1px solid var(--line); color: var(--brand); background: #fff;
    }
    .actions a:hover { background: #fcefe4; }
    #qr { display: flex; justify-content: center; margin: 18px 0 4px; }
    #qr img, #qr canvas { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: #fff; }
    .expiry { text-align: center; font-size: 13px; color: var(--muted); margin-top: 8px; }
    .expiry b { color: var(--brand-dark); }
    .msg { margin-top: 14px; font-size: 14px; padding: 10px 12px; border-radius: 10px; display: none; }
    .msg.show { display: block; }
    .msg.error { background: #fdecea; color: var(--err); }
    .footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>Zukerino Pastry Shop</h1>
      <p>Create a card payment link</p>
    </div>

    <div class="card">
      <form id="form">
        <label for="amount">Amount</label>
        <div class="amount-row">
          <span>$</span>
          <input id="amount" type="number" inputmode="decimal" step="0.01" min="0.01" placeholder="0.00" required />
        </div>

        <label for="itemName">What's it for <span class="hint">(optional)</span></label>
        <input id="itemName" type="text" placeholder="e.g. Birthday cake — 8 inch" />

        <label for="customerName">Customer name <span class="hint">(optional)</span></label>
        <input id="customerName" type="text" placeholder="e.g. Maria Lopez" />

        <label for="customerEmail">Customer email <span class="hint">(optional — for their receipt)</span></label>
        <input id="customerEmail" type="email" placeholder="name@example.com" />

        <button type="submit" id="submit">Generate payment link</button>
      </form>

      <div class="msg error" id="error"></div>

      <div class="result" id="result">
        <label>Payment link — send this to the customer</label>
        <div class="linkbox">
          <input id="link" type="text" readonly />
          <button type="button" class="copy-btn" id="copy">Copy</button>
        </div>
        <div class="actions">
          <a id="sms" href="#">Text it</a>
          <a id="open" href="#" target="_blank" rel="noopener">Open</a>
        </div>
        <div id="qr"></div>
        <div class="expiry">Link expires in <b><span id="countdown">15:00</span></b> — for payment right now.</div>
      </div>
    </div>

    <div class="footer">Powered by Clover Hosted Checkout</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submit');
    const errorBox = document.getElementById('error');
    const result = document.getElementById('result');
    const linkInput = document.getElementById('link');
    const copyBtn = document.getElementById('copy');
    const smsLink = document.getElementById('sms');
    const openLink = document.getElementById('open');
    const qrBox = document.getElementById('qr');
    const countdownEl = document.getElementById('countdown');
    let countdownTimer = null;

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
      result.classList.remove('show');
    }
    function clearError() { errorBox.classList.remove('show'); }

    function startCountdown(expiresAtMs) {
      if (countdownTimer) clearInterval(countdownTimer);
      function tick() {
        const remaining = Math.max(0, Math.floor((expiresAtMs - Date.now()) / 1000));
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        countdownEl.textContent = m + ':' + s;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          countdownEl.textContent = 'expired — generate a new link';
        }
      }
      tick();
      countdownTimer = setInterval(tick, 1000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Generating…';

      const payload = {
        amount: document.getElementById('amount').value,
        itemName: document.getElementById('itemName').value,
        customerName: document.getElementById('customerName').value,
        customerEmail: document.getElementById('customerEmail').value
      };

      try {
        const resp = await fetch('/api/create-link', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.error || 'Something went wrong.');
          return;
        }

        const url = data.url;
        linkInput.value = url;
        openLink.href = url;
        smsLink.href = 'sms:?&body=' + encodeURIComponent('Here is your Zukerino payment link: ' + url);

        qrBox.innerHTML = '';
        if (window.QRCode) {
          new QRCode(qrBox, { text: url, width: 150, height: 150, colorDark: '#3a2a20', colorLight: '#ffffff' });
        }

        if (data.expiresAt) startCountdown(Number(data.expiresAt));
        result.classList.add('show');
      } catch (err) {
        showError('Network error: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generate payment link';
      }
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(linkInput.value);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => (copyBtn.textContent = 'Copy'), 1500);
      } catch {
        linkInput.select();
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
        setTimeout(() => (copyBtn.textContent = 'Copy'), 1500);
      }
    });
  </script>
</body>
</html>
